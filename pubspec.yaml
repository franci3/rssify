name: rssify
description: "Minimalistic RSS Reader for MacOS"
publish_to: 'none'
version: 1.0.2+11

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  stockholm: ^0.2.3
  flutter_riverpod: ^3.3.2
  drift: 2.34.0
  path_provider: ^2.1.6
  path: ^1.9.1
  drift_flutter: ^0.3.0
  crypto: ^3.0.7
  http: ^1.6.0
  xml: ^7.0.1
  logging: ^1.3.0
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  intl: any
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: 2.34.0
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
  generate: true
